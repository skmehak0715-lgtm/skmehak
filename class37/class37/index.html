<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>index</title>
    <style>
        body{
            background-color: aquamarine;
            margin: 0;
            font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;
        }
        .topnav{
            background-color: brown;
            overflow: hidden;
        }
        .topnav a{
            float: right;
            color: burlywood;
            font-size: 17px;
            text-align: center;
            padding: 14px 16px;
            text-decoration: none;
        }
        .topnav a:hover{
            color: blueviolet;
            font-size: 21px;
        }
        .topnav a.active{
            background-color: goldenrod;
            color: black;
        }
        .carousel-container{
            width: 250px;
            height: 300px;
            display: flex;
            align-items: center;
            justify-content: center;

        }
        .myslides{
            display: none;
            max-height: 100%;
            max-width: 100%;
        }
    </style>
</head>
<body>
    <div class="topnav">
       <a href ="index.html" class="active">Home</a>
       <a href ="about.html">About</a>
       <a href ="gallery.html">Gallery</a>
       <a href ="contactus.html">Contact us</a>
    </div>
    <div class="carousel-container">
        <img class="myslides" src = "p1.jpg" alt="image1">
        <img class="myslides" src = "p2.jpg" alt="image2">
        <img class="myslides" src = "p3.jpg" alt="image3">
     
        <script>
            var index = 0;
            function carousel(){
                var i;
                var x = document.getElementsByClassName("myslides")
                for(i=0; i<x.length; i++){
                    x[i].style.display = "none"
                }
                index++;
                if (index >x.length){
                    index=1
                }
                x[index-1].style.display = "block";
                setTimeout(carousel,2000)
            }
            carousel()
        </script>
    </div>
</body>
</html>
